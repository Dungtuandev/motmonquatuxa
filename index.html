<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Một món quà từ xa... 🧸🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff9e6 0%, #ffe0b2 100%);
            background-attachment: fixed; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #4a4a4a;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
        }

        .video-box {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-top: 25px; 
            display: none; 
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .video-box p {
            font-weight: 600;
            color: #d48806;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .video-responsive-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background-color: #000;
        }

        .video-responsive-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #introScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px; 
        }

        .icon-gift {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            color: #d48806;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .btn-open {
            background-color: #ffa940;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 169, 64, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            -webkit-tap-highlight-color: transparent; 
        }

        .btn-open:hover {
            background-color: #fa8c16;
            transform: scale(1.05);
        }

        #letterScreen {
            display: none;
            text-align: left;
            line-height: 1.8;
            font-size: 17px;
        }

        .letter-content {
            min-height: 150px;
        }

        /* KHUNG CHỮ KÝ ĐƯỢC LÀM MỚI ĐỂ CHỨA ẢNH */
        .signature {
            margin-top: 30px;
            text-align: right;
            opacity: 0;
            transition: opacity 1.5s ease-in;
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Ép mọi thứ dạt sang lề phải */
        }

        .signature p {
            font-style: italic;
            color: #d48806;
            margin-bottom: 5px;
        }

        /* Tùy chỉnh ảnh chữ ký */
        .signature img {
            max-width: 150px; /* Giới hạn độ lớn chữ ký để không bị thô */
            height: auto;
            margin-bottom: 5px;
            /* Nếu ảnh của bạn bị mờ, có thể thêm filter: contrast(1.2); vào đây */
        }

        .signature h3 {
            font-family: 'Dancing Script', cursive; /* Tên dùng font cách điệu cho nghệ thuật */
            font-size: 26px;
            color: #d48806;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            body { padding: 20px 15px; }
            .container { padding: 30px 20px; }
            .video-box { padding: 20px 15px; } 
            .icon-gift { font-size: 65px; }
            h1 { font-size: 26px; margin-bottom: 25px; }
            .btn-open { padding: 12px 25px; font-size: 16px; }
            #letterScreen { font-size: 15.5px; line-height: 1.7; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        .fade-out { animation: fadeOut 0.8s forwards; }
        .fade-in { animation: fadeIn 1s forwards; }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="introScreen">
            <div class="icon-gift">💌🌻</div>
            <h1>Có một món quà nhỏ gửi từ xa...</h1>
            <button class="btn-open" onclick="openLetter()">Mở Thư</button>
        </div>

        <div id="letterScreen">
            <div class="letter-content" id="typewriterText"></div>
            
            <div class="signature" id="signatureBox">
                <p>Thân gửi,</p>
                <img src="chu_ky.png" alt="Chữ ký">
                <h3>Nguyễn Tuấn Dũng</h3>
            </div>
        </div>
    </div>

    <div class="video-box" id="videoContainerBox">
        <p>🎬 Một chút hậu trường mình làm bông hoa này tặng bạn nè 👇</p>
        
        <div class="video-responsive-container">
            <iframe src="https://www.youtube.com/embed/IbtB-9Ht0ZM?rel=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
    </div>

    <script>
  const letterLines = [
    "Gửi bạn Đan cute 🌻,<br><br>",
    "Cho mình xin lũi cậu nhiều nha vì không tặng quà trực tiếp cho cậu dc😢. Cho mình xin phép bạn gấu bông này được thay mình gửi bông hoa này tới cậu nha😊<br><br>",
    "Bông hoa này là tự tay mình làm tặng cậu, tuy rằng nó không được đẹp hay rực rỡ giống hoa thật, nhưng cũng là tất cả tấm lòng mình muốn gửi tặng cho cậu😸<br><br>",
    "Mình mong cậu lúc nào cũng giống như bông hoa này nha, dù có mệt mỏi hay áp lực thì vẫn luôn rạng rỡ và hướng về những điều tích cực nhé ☀️.<br><br>",
    "Hoa này không bao giờ héo nên mong nụ cười của cậu cũng thế nha. Giữ gìn sức khỏe và lúc nào cũng vui vẻ nhé! 🍀"
];

        let currentLine = 0;
        let currentChar = 0;
        const speed = 40; 
        const textContainer = document.getElementById("typewriterText");
        
        function openLetter() {
            const intro = document.getElementById("introScreen");
            const letter = document.getElementById("letterScreen");

            intro.classList.add("fade-out");
            
            setTimeout(() => {
                intro.style.display = "none";
                letter.style.display = "block";
                letter.classList.add("fade-in");
                
                setTimeout(typeWriter, 500);
            }, 800);
        }

        function typeWriter() {
            if (currentLine < letterLines.length) {
                let text = letterLines[currentLine];
                
                if (currentChar < text.length) {
                    if (text.charAt(currentChar) === '<') {
                        let tagEnd = text.indexOf('>', currentChar);
                        if (tagEnd !== -1) {
                            textContainer.innerHTML += text.substring(currentChar, tagEnd + 1);
                            currentChar = tagEnd + 1;
                        }
                    } else {
                        let cp = text.codePointAt(currentChar);
                        let char = String.fromCodePoint(cp);
                        textContainer.innerHTML += char;
                        currentChar += char.length; 
                    }

                    window.scrollTo(0, document.body.scrollHeight);
                    setTimeout(typeWriter, speed);
                } else {
                    currentLine++;
                    currentChar = 0;
                    setTimeout(typeWriter, speed);
                }
            } else {
                document.getElementById("signatureBox").style.opacity = 1;
                
                setTimeout(() => {
                    const videoBox = document.getElementById("videoContainerBox");
                    videoBox.style.display = "block"; 
                    
                    setTimeout(() => {
                        videoBox.style.opacity = 1; 
                        
                        setTimeout(() => {
                            videoBox.scrollIntoView({ behavior: 'smooth', block: 'end' });
                        }, 300);
                    }, 50);
                }, 1500);
            }
        }
    </script>

</body>
</html>
